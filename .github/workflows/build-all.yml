name: Build All Latest Assets

on:
  workflow_dispatch:
    inputs:
      newRelease:
        description: 'Upload assets to new draft release?'
        default: false
        type: boolean

jobs:
  build-alpine:
    uses: ./.github/workflows/build-alpine.yml
  build-linux:
    uses: ./.github/workflows/build-linux.yml
  build-linuxstatic:
   uses: ./.github/workflows/build-linuxstatic.yml
  build-macos:
   uses: ./.github/workflows/build-macos.yml
  build-windows:
   uses: ./.github/workflows/build-windows.yml

  collect-artifacts:
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    needs: [build-alpine, build-linux, build-linuxstatic, build-macos, build-windows]
    outputs:
      shas: ${{ steps.generate_sha_file.outputs.shas_txt }}
    steps:
      - run: echo Is making new release? '${{ inputs.newRelease }}'
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: downloaded-artifacts

      - name: Get previous release tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        id: get_previous_release
        run: |
          PREV_RELEASE=$(gh release list --limit 1 --exclude-drafts --exclude-pre-releases | cut -f3)
          if [ -z "$PREV_RELEASE" ]; then
            echo "No Previous Release"
          else
            echo "Using release ${PREV_RELEASE}"
            echo "prev_release=${PREV_RELEASE}" >> $GITHUB_OUTPUT
          fi

      - name: Get previously released artifacts
        if: ${{ inputs.newRelease && steps.get_previous_release.outputs.prev_release != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ steps.get_previous_release.outputs.prev_release }} --dir release-artifacts

      - name: Create artifact folders
        run: mkdir artifact-binaries && mkdir artifact-shas

      - name: Copy previous release artifacts to artifact folders
        if: ${{ inputs.newRelease && steps.get_previous_release.outputs.prev_release != '' }}
        run: |
          pushd release-artifacts
          pwd
          ls -la
          mv *.sha256sum ../artifact-shas/.
          mv * ../artifact-binaries/.
          popd

      - name: Copy current workflow artifacts to artifact folders
        run: |
          pushd downloaded-artifacts
          pwd
          ls -la
          for f in $(ls); do
            mv $f/*.sha256sum ../artifact-shas/.
            mv $f/* ../artifact-binaries/.
          done
          popd

      - name: Check SHAs
        run: |
          cd artifact-binaries
          ls ../artifact-shas/*.sha256sum | xargs sha256sum --check

      - name: Generate SHA summary
        id: generate_sha_file
        run: |
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Update $(date -u +%F) $(date -u +%T) GMT/UTC" >> $GITHUB_STEP_SUMMARY
          echo "### SHAs of produced and carried forward binaries by this workflow" >> $GITHUB_STEP_SUMMARY
          echo "  - $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat artifact-shas/*.sha256sum >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Store SHAs in output variable using multiline format
          echo "shas_txt<<EOF" >> $GITHUB_OUTPUT
          cat artifact-shas/*.sha256sum >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Get a random string of characters to represent the EOF delimiter
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "sha_summary<<$EOF" >> $GITHUB_ENV
          cat $GITHUB_STEP_SUMMARY >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Determine release tag to upload assets to and draft type
        run: |
          if [[ "${{ inputs.newRelease && steps.get_previous_release.outputs.prev_release != '' }}" == "false" ]]; then
            echo "use_release_tag=${{ steps.get_previous_release.outputs.prev_release }}" >> $GITHUB_ENV
            echo "create_draft=false" >> $GITHUB_ENV
          else
            echo "use_release_tag=draft_release_${{ github.sha }}" >> $GITHUB_ENV
            echo "create_draft=true" >> $GITHUB_ENV
          fi

      - name: Add binaries to release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.use_release_tag }}
          DRAFT: ${{ env.create_draft }}
          BODY: ${{ env.sha_summary }}
        # Replaces a SHA-pinned `softprops/action-gh-release@d4e8205` call
        # that ran with `generate_release_notes: true` + `append_body: true`.
        # We must preserve those semantics exactly:
        #   - On UPDATE (release already exists for the tag): softprops with
        #     `append_body: true` keeps the existing release body and appends
        #     the new `body`. `generate_release_notes` is silently ignored
        #     by the GitHub PATCH /releases API on update, so softprops
        #     never actually injected auto-notes here — confirmed by the
        #     production v3.5 body, which has accumulated SHA sections
        #     since 2023 and contains zero auto-gen markers. We must do
        #     the same: read existing body, append new SHA summary, write.
        #   - On CREATE: softprops + GitHub semantics for `body` plus
        #     `generate_release_notes: true` PRE-pends the body to the
        #     auto-generated notes (per action.yml docs and the
        #     POST /releases REST API contract). `gh release create`
        #     makes --generate-notes and --notes-file mutually exclusive,
        #     so we fetch the generated body via the REST API and
        #     concatenate in the correct order: BODY + "\n\n" + auto-notes.
        # Asset overwrite via `--clobber` mirrors softprops's default
        # `overwrite_files: true`. Title and draft state on update are
        # left untouched, matching softprops's update path.
        run: |
          set -e
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            # UPDATE path — preserve existing body, append SHA summary.
            gh release view "$TAG" --json body --jq .body > "$NOTES_FILE"
            printf '\n%s\n' "$BODY" >> "$NOTES_FILE"
            gh release edit   "$TAG" --notes-file "$NOTES_FILE"
            gh release upload "$TAG" artifact-shas/* artifact-binaries/* --clobber
          else
            # CREATE path — body PRE-pended to auto-generated notes.
            AUTO_NOTES="$RUNNER_TEMP/auto-notes.md"
            gh api -X POST "/repos/$GITHUB_REPOSITORY/releases/generate-notes" \
              -f tag_name="$TAG" --jq '.body' > "$AUTO_NOTES"
            { printf '%s\n\n' "$BODY"; cat "$AUTO_NOTES"; } > "$NOTES_FILE"

            DRAFT_ARGS=()
            [ "$DRAFT" = "true" ] && DRAFT_ARGS=(--draft)
            gh release create "$TAG" "${DRAFT_ARGS[@]}" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              artifact-shas/* artifact-binaries/*
          fi

          URL=$(gh release view "$TAG" --json url --jq .url)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Add release url to summary
        run: echo "Release created/updated at ${{ steps.create_release.outputs.url }}" >> $GITHUB_STEP_SUMMARY

  update-expected-shas:
    needs: collect-artifacts
    uses: ./.github/workflows/update-expected.yml
    with:
      shas: ${{ needs.collect-artifacts.outputs.shas }}