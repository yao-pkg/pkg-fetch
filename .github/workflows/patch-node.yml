name: Create new Node.js patch

on:
  workflow_dispatch:
    inputs:
      nodeVersion:
        description: 'Node.js version (e.g. 20.11.0)'
        default: ''
        type: string
        required: true
      patchFile:
        description: 'Patch version to use (e.g. 20.11.0). Leave empty to use the matching major patch'
        default: ''
        type: string
        required: false

jobs:
  build:
    permissions:
      contents: write
      pull-requests: write
      models: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Apply existing patch
        id: apply
        run: |
          set -e

          MAJOR_VERSION=$(echo "${{ inputs.nodeVersion }}" | cut -d'.' -f1)
          echo "Node.js major version: $MAJOR_VERSION"

          if [ -z "${{ inputs.patchFile }}" ]; then
            PATCH_FILE=$(ls patches/node.v$MAJOR_VERSION.*.patch)
          else
            PATCH_FILE="patches/node.v${{ inputs.patchFile }}.cpp.patch"
          fi

          if [ ! -f "$PATCH_FILE" ]; then
            echo "No patch file found for Node.js version ${{ inputs.nodeVersion }}"
            exit 1
          fi

          PATCH_VERSION=$(echo "$PATCH_FILE" | grep -oP 'node\.v\K[0-9]+\.[0-9]+\.[0-9]+')
          echo "Patch file:    $PATCH_FILE"
          echo "Patch version: $PATCH_VERSION"

          echo "PATCH_FILE=$PATCH_FILE"       >> "$GITHUB_ENV"
          echo "PATCH_VERSION=$PATCH_VERSION" >> "$GITHUB_ENV"
          # Default so later `${{ env.RESOLUTION_OUTPUT }}` is always defined.
          echo "RESOLUTION_OUTPUT="           >> "$GITHUB_ENV"

          cd ..
          echo "Cloning Node.js v${{ inputs.nodeVersion }}"
          git clone -b "v${{ inputs.nodeVersion }}" --single-branch https://github.com/nodejs/node.git
          cd node

          if git apply --check "../pkg-fetch/$PATCH_FILE" 2>/dev/null; then
            echo "✅ Patch applies cleanly"
            git apply "../pkg-fetch/$PATCH_FILE"
            echo "needs_ai=false" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ Patch does not apply cleanly, falling back to --reject"
            git apply --reject "../pkg-fetch/$PATCH_FILE" || true
            REJECT_COUNT=$(find . -name '*.rej' -type f | wc -l)
            if [ "$REJECT_COUNT" -eq 0 ]; then
              echo "ℹ️ No reject files produced; patch applied partially"
              echo "needs_ai=false" >> "$GITHUB_OUTPUT"
            else
              echo "🤖 $REJECT_COUNT reject file(s); will use AI to resolve"
              echo "needs_ai=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build AI prompt
        if: steps.apply.outputs.needs_ai == 'true'
        # Write the prompt to RUNNER_TEMP — anything inside the checkout
        # gets picked up by peter-evans/create-pull-request below.
        run: python3 .github/scripts/ai_resolver.py prepare ../node "$RUNNER_TEMP/ai_prompt.md"

      - name: Resolve conflicts with AI
        if: steps.apply.outputs.needs_ai == 'true'
        id: ai
        uses: actions/ai-inference@v2
        with:
          prompt-file: ${{ runner.temp }}/ai_prompt.md
          system-prompt: |
            You are an expert C/C++/JavaScript developer maintaining a Git patch against the Node.js source tree.
            Output ONLY the requested search/replace blocks in the exact format the user specifies.
            No markdown fences, no commentary, no preamble.

            Patch-structure rules (failing these breaks the build):
            - In each rejected hunk, lines starting with a single space are CONTEXT — they exist in
              the current file and must continue to exist there after your resolution. Never delete
              or merge a context line, even if it is blank.
            - Lines starting with `-` are removals (drop from the file); lines starting with `+` are
              additions (insert into the file). Context lines stay put.
            - Preserve every blank line that appears as context. Two blocks separated by a blank
              line in the original file must remain separated by a blank line after your edit.
            - SEARCH must match the file's CURRENT content byte-for-byte (whitespace included).
            - REPLACE must contain the same context lines as SEARCH, with the `+`/`-` edits applied.
              Whitespace and indentation in REPLACE must mirror the surrounding code style.
          # gpt-4.1 outperforms gpt-4o on coding + instruction-following
          # (key for the strict SEARCH/REPLACE output format) and is not a
          # reasoning model, so its output budget isn't shared with hidden
          # CoT tokens. 1M input / 32K output / "high" rate-limit tier.
          model: openai/gpt-4.1
          max-completion-tokens: 16000
          # Low (not zero): cuts variance vs. the model default while
          # leaving enough exploration to avoid the local-optimum traps
          # of greedy decoding on long structured output.
          temperature: 0.2

      - name: Apply AI resolutions
        if: steps.apply.outputs.needs_ai == 'true'
        run: |
          set -eo pipefail
          # Python exits non-zero on unresolved conflicts; pipefail+set -e
          # ensures the whole step fails so the PR step is skipped. The summary
          # is saved to a temp file that the verify step folds into the PR body.
          python3 .github/scripts/ai_resolver.py apply ../node "${{ steps.ai.outputs.response-file }}" \
            | tee "$RUNNER_TEMP/resolution_output.txt"

      - name: Generate new patch & update patches.json
        run: |
          set -e

          NEW_PATCH="patches/node.v${{ inputs.nodeVersion }}.cpp.patch"

          cd ../node
          git add -A
          git diff --staged --src-prefix=node/ --dst-prefix=node/ \
            > "../pkg-fetch/$NEW_PATCH"

          cd ../pkg-fetch

          # A zero-byte diff means the resolved tree carries no change at all —
          # the patch would be a no-op and the build would be unpatched. Never
          # open a PR for that.
          if [ ! -s "$NEW_PATCH" ]; then
            echo "❌ Regenerated patch is empty — the resolved tree produced no diff. Aborting."
            exit 1
          fi

          # Record whether the regenerated patch is byte-identical to the source
          # patch. That is legitimate (the touched source files were unchanged
          # between releases) but worth surfacing in the PR body so a no-op
          # carry-forward is not mistaken for a failed resolution.
          if [ -f "$PATCH_FILE" ] && cmp -s "$PATCH_FILE" "$NEW_PATCH"; then
            echo "PATCH_CHANGED=false" >> "$GITHUB_ENV"
          else
            echo "PATCH_CHANGED=true" >> "$GITHUB_ENV"
          fi
          echo "NEW_PATCH=$NEW_PATCH" >> "$GITHUB_ENV"

          # Replace the old version entry with the new one. If a `patchFile`
          # input was supplied, $PATCH_VERSION refers to that source patch.
          sed -i \
            "s/\"v$PATCH_VERSION\": \[\"node.v$PATCH_VERSION.cpp.patch\"\]/\"v${{ inputs.nodeVersion }}\": \[\"node.v${{ inputs.nodeVersion }}.cpp.patch\"\]/" \
            patches/patches.json

          # Remove the old patch file unless we just overwrote it in place.
          if [ "$PATCH_FILE" != "$NEW_PATCH" ]; then
            rm -f "$PATCH_FILE"
          fi

      - name: Verify regenerated patch & summarize
        run: |
          set -e

          # The earlier "apply" step proved the OLD patch applies. This proves
          # the freshly REGENERATED patch applies to a pristine v${{ inputs.nodeVersion }}
          # tree — catching any case where an AI resolution left the working
          # tree in a state that cannot be re-expressed as a clean patch.
          cd ../node
          git reset --hard HEAD >/dev/null
          git clean -fd >/dev/null   # drop leftover .rej/.orig
          if git apply --check "../pkg-fetch/$NEW_PATCH"; then
            VERIFY="✅ Regenerated patch applies cleanly to a pristine v${{ inputs.nodeVersion }} tree."
          else
            echo "❌ Regenerated patch does NOT apply to a pristine v${{ inputs.nodeVersion }} tree — aborting before PR."
            exit 1
          fi
          cd ../pkg-fetch

          # Compose an honest PR body. Never claim the AI ran when it did not.
          if [ "${{ steps.apply.outputs.needs_ai }}" = "true" ]; then
            MODE="🤖 Conflicts were resolved with \`actions/ai-inference@v2\` (GitHub Models)."
            if [ -f "$RUNNER_TEMP/resolution_output.txt" ]; then
              MODE="$MODE"$'\n\n'"$(cat "$RUNNER_TEMP/resolution_output.txt")"
            fi
          else
            MODE="✅ The existing v$PATCH_VERSION patch applied cleanly to v${{ inputs.nodeVersion }} — no AI resolution was needed."
          fi

          if [ "$PATCH_CHANGED" = "false" ]; then
            CHANGED="ℹ️ The regenerated patch is byte-identical to v$PATCH_VERSION — the source files it touches did not change between the two releases."
          else
            CHANGED="ℹ️ The patch was updated to match the v${{ inputs.nodeVersion }} source tree."
          fi

          {
            echo "RESOLUTION_OUTPUT<<EOF"
            printf '%s\n\n%s\n\n%s\n' "$MODE" "$CHANGED" "$VERIFY"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add v${{ inputs.nodeVersion }} patch"
          title: "feat: add v${{ inputs.nodeVersion }} patch"
          body: |
            ## Node.js Patch Update to v${{ inputs.nodeVersion }}

            This PR updates the Node.js patch from v${{ env.PATCH_VERSION }} to v${{ inputs.nodeVersion }}.

            ### Resolution
            ${{ env.RESOLUTION_OUTPUT }}
          branch: "nodejs-v${{ inputs.nodeVersion }}"
          base: "main"
          # Be explicit — only patch files belong in the PR, never any
          # workspace scratch files that might appear during the run.
          add-paths: |
            patches/*.patch
            patches/patches.json
          delete-branch: true
          labels: "enhancement,nodejs"
          draft: false
